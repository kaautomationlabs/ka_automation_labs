name: KA Automation Labs Hourly Run

on:
  schedule:
    # This runs at the start of every hour (06:00, 07:00, etc.)
    # GitHub uses UTC. 0 * * * * triggers 24 times a day.
    # Your main.py logic will handle the 6 AM - 9 PM IST filtering.
    - cron: '0 * * * *'
  workflow_dispatch: # This adds a "Run" button so you can test it manually

jobs:
  tweet:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install tweepy requests python-dotenv

      - name: Run Bot
        env:
          # These link your GitHub Secrets to the Python script
          API_KEY: ${{ secrets.API_KEY }}
          API_SECRET: ${{ secrets.API_SECRET }}
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          ACCESS_SECRET: ${{ secrets.ACCESS_SECRET }}
          OPENWEATHER_KEY: ${{ secrets.OPENWEATHER_KEY }}
        run: python main.py